# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - voycelink-prime

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: npm install, build, and test
        run: |
          npm ci
          npm run build --if-present
          npm run test --if-present
          npm prune --omit=dev

      - name: Prepare deployment package
        run: |
          rm -rf deploy
          mkdir -p deploy
          cp -R dist deploy/dist
          cp -R dist/public/. deploy/
          cp package.json package-lock.json deploy/
          cp -R node_modules deploy/node_modules
          printf '{"gitSha":"%s","builtAt":"%s"}\n' "${GITHUB_SHA}" "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" > deploy/build-info.json

      - name: Archive deployment package
        run: |
          cd deploy
          zip -r ../node-app.zip .

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: node-app.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: .

      - name: Inspect deployment package
        run: unzip -l node-app.zip | sed -n '1,120p'
      
      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'voycelink-prime'
          slot-name: 'Production'
          package: node-app.zip
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_3BC5E6F6B596439E88B6057F96260323 }}
